name: Code Quality

on:
  workflow_call:

jobs:

  code_quality:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Setup castor
        uses: castor-php/setup-castor@v1.0.0

      - name: Cache Composer Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/files
          key: composer-${{ hashFiles('**/composer.lock') }}

      - name: Deploy stack
        run: USER_ID=$(id -u) GROUP_ID=$(id -g) make docker.deploy.ci

      - name: Install Symfony
        run: make symfony.install

      - name: Setup github token
        run: make composer.command args="config -g github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}"

      - name: Install barlito/utils
        run: make package.barlito_utils.install

      - name: Install php cs fixer
        run: make cs_fixer.install

      - name: Install phpcs
        run: make phpcs.install

      - name: Install phpmd
        run: make phpmd.install

      - name: Run php cs fixer
        continue-on-error: true
        run: make cs_fixer.dry_run

      - name: Run phpcs
        run: make phpcs

      - name: Run phpmd
        run: make phpmd

      - name: Undeploy stack
        if: always()
        run: make docker.undeploy.ci
